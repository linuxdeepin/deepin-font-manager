version: "1"

package:
  id: org.deepin.fontmanager
  name: "deepin-font-manager"
  version: 6.5.36.1
  kind: app
  description: |
    font manager for deepin os.

base: org.deepin.base/25.2.2
runtime: org.deepin.runtime.dtk/25.2.2

command:
  - deepin-font-manager

build: |
  # 下载和安装依赖
  apt -y install --download-only libdtk6widget-dev libdtk6gui-dev qt6-base-dev qt6-tools-dev qt6-tools-dev-tools qt6-svg-dev libfontconfig1-dev libfreetype6-dev dde-file-manager-dev deepin-gettext-tools libgtest-dev
  bash ./install_dep /var/cache/apt/archives "$PREFIX"

  sed -i "s|/usr|$(echo ${PREFIX})|g" ${PREFIX}/lib/${TRIPLET}/cmake/dfm6-base/*.cmake

  # add path for searching OpenGL
  export PATH=$PATH:/runtime/include:/runtime/lib/${TRIPLET}

  # 获取版本号
  VERSION=$(head -1 debian/changelog | awk -F'[()]' '{print $2}')
  # 使用sed命令替换version的值
  # sed -i "s/^  version: .*/  version: ${VERSION}.1/" linglong.yaml

  cmake -B build ${conf_args} \
        -DCMAKE_SAFETYTEST_ARG="CMAKE_SAFETYTEST_ARG_OFF" \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
        -DLIB_INSTALL_DIR="${PREFIX}/lib/${TRIPLET}" \
        -DVERSION=${VERSION}

  cmake --build build -j`nproc`
  cmake --build build --target install > install.log 2>&1

  # 项目生成应用名和动态隐式加载的依赖库，ldd无法找到的其他库
  LDD_FILES=(
    deepin-font-manager
  )

  # 生成.install 文件
  bash ./deploy_dep "${LDD_FILES[@]}"

# allow apt download in build and do apt update
buildext:
  apt:
    build_depends:
      - libc6
